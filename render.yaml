services:
  - type: web
    name: inventario-laboratorio
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    numInstances: 1
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PORT
        value: 8080
      - key: RUST_LOG
        value: info
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ENABLE_SWAGGER
        value: false
      - key: LOGIN_RATE_LIMIT_PER_MINUTE
        value: 10
      - key: MUTATION_RATE_LIMIT_PER_MINUTE
        value: 120
      - key: READ_RATE_LIMIT_PER_MINUTE
        value: 600
      - key: ALLOW_BOOTSTRAP_ADMIN
        value: false
