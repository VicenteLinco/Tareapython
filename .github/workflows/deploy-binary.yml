name: Deploy Binary to Render

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build Binaries and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. Compilar Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # --- 2. Compilar Backend (Linux) ---
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Backend (Release)
        working-directory: backend
        env:
          SQLX_OFFLINE: true
        run: cargo build --release

      # --- 3. Preparar Estructura de Deploy ---
      - name: Prepare Deploy Payload
        run: |
          mkdir -p deploy-payload/static
          mkdir -p deploy-payload/migrations
          
          # Copiar el binario compilado de Linux
          cp backend/target/release/inventario-lab-backend deploy-payload/
          
          # Copiar migraciones de base de datos
          cp -r backend/migrations/* deploy-payload/migrations/
          
          # Copiar archivos estáticos del frontend
          cp -r frontend/dist/* deploy-payload/static/
          
          # Copiar el Dockerfile de ejecución para Render
          cp Dockerfile.render deploy-payload/Dockerfile
          
          # Copiar el render.yaml
          cp render.yaml deploy-payload/render.yaml

      # --- 4. Subir a la rama release-render ---
      - name: Deploy to Branch 'release-render'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release-render
          folder: deploy-payload
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
