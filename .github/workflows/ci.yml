name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate source and build boundaries
        run: make check
      - name: Validate locked backend dependency graph
        env:
          SQLX_OFFLINE: "true"
        run: cargo metadata --locked --manifest-path source/backend/Cargo.toml --format-version 1 --no-deps >/dev/null

  backend-filesystem-contracts:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run focused non-database contracts
        env:
          SQLX_OFFLINE: "true"
        run: >-
          cargo test --locked --manifest-path source/backend/Cargo.toml
          --test migration_contract_test --test release_contract_test -- --nocapture

  backend-database-contracts:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run isolated database tests
        env:
          SQLX_OFFLINE: "true"
        run: |
          ./source/tooling/test-isolated-db.sh --workdir source/backend -- cargo test --locked --test db_isolation_contract -- --nocapture

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm --prefix source/frontend ci --no-audit --no-fund
      - name: Test
        run: npm --prefix source/frontend test
      - name: Lint
        run: npm --prefix source/frontend run lint
      - name: Build
        run: npm --prefix source/frontend run build

